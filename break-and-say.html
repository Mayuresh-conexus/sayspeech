.bg-storybook {
    background: linear-gradient(180deg, #A2E4E1 0%, #E8F8F5 100%);
    position: relative;
    overflow: hidden;
  }

.hill-layer-1 {
    position: absolute;
    bottom: 10%;
    left: -10%;
    width: 120%;
    height: 40%;
    background: #80D9A2;
    border-radius: 50% 50% 0 0;
    z-index: 1;
  }

.hill-layer-2 {
    position: absolute;
    bottom: 5%;
    left: -20%;
    width: 140%;
    height: 35%;
    background: #5FC687;
    border-radius: 50% 50% 0 0;
    z-index: 2;
  }

.sand-layer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 15%;
    background: #F9CA7A;
    z-index: 3;
    border-top: 4px solid #F1B54B;
  }

.sun-rays {
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: repeating-conic-gradient(from 0deg, transparent 0deg 15deg, rgba(255, 255, 255, 0.1) 15deg 30deg);
    animation: rotateRays 60s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

.dark .sun-rays {
    background: repeating-conic-gradient(from 0deg, transparent 0deg 15deg, rgba(255, 255, 255, 0.02) 15deg 30deg);
  }

.cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.8;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
    pointer-events: none;
    z-index: 1;
  }

.cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }

.dark .cloud {
    background: #e2e8f0;
    opacity: 0.2;
  }

.dark .cloud::before, .dark .cloud::after {
    background: #e2e8f0;
  }

@keyframes rotateRays {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
